<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC Edge Gateway — Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px 36px;
            width: 360px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .login-title {
            font-size: 20px;
            font-weight: 700;
            color: #93c5fd;
            margin-bottom: 6px;
            text-align: center;
        }
        .login-sub {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 5px;
            padding: 8px 12px;
            font-size: 12px;
            margin-top: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">🔧 PLC Edge Gateway</div>
        <div class="login-sub">Allen-Bradley ControlLogix</div>
        <form id="loginForm">
            <label>Пароль</label>
            <input type="password" id="pwdInput" placeholder="Введите пароль" autofocus />
            <button type="submit" id="loginBtn">Войти</button>
            <div class="error" id="errMsg"></div>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errMsg');
            const pwd = document.getElementById('pwdInput').value;
            btn.disabled = true;
            btn.textContent = '⏳';
            err.style.display = 'none';
            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });
                if (r.ok) {
                    const data = await r.json();
                    localStorage.setItem('plc_token', data.token);
                    window.location.href = '/';
                } else {
                    err.textContent = 'Неверный пароль';
                    err.style.display = 'block';
                }
            } catch (ex) {
                err.textContent = 'Ошибка сети: ' + ex.message;
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
